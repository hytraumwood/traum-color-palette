<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traum Color Palette</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  input[type="color"] { width: 44px; height: 36px; border: 0.5px solid #ccc; border-radius: 6px; cursor: pointer; padding: 2px; background: #fff; }
  input[type="text"] { height: 36px; border: 0.5px solid #ccc; border-radius: 6px; padding: 0 10px; font-size: 14px; font-family: inherit; background: #fff; color: #1a1a1a; outline: none; }
  input[type="text"]:focus { border-color: #888; }
  input#hexInput { width: 110px; font-family: monospace; }
  input#labelInput { flex: 1; min-width: 140px; }
  button { height: 36px; padding: 0 14px; border: 0.5px solid #ccc; border-radius: 6px; background: #fff; font-size: 14px; font-family: inherit; cursor: pointer; color: #1a1a1a; }
  button:hover { background: #f0f0ee; }
  button#clearBtn { color: #888; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .card { border-radius: 12px; border: 0.5px solid #ddd; overflow: hidden; background: #fff; }
  .swatch-top { height: 80px; display: flex; align-items: flex-end; padding: 8px; position: relative; cursor: pointer; }
  .hex-label { font-size: 13px; font-family: monospace; font-weight: 500; padding: 3px 7px; border-radius: 4px; }
  .remove-btn { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; border: none; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .card-body { padding: 8px 10px; }
  .card-label { font-size: 13px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1a1a1a; }
  .card-meta { font-size: 11px; color: #888; line-height: 1.6; font-family: monospace; }
  .copied { font-size: 11px; color: #2d7a2d; height: 14px; margin-top: 4px; }
  .error-shake { border-color: #e24b4a !important; }
</style>
</head>
<body>

<h1>Traum color palette</h1>

<div class="controls">
  <input id="colorPicker" type="color" value="#3B82F6" title="Pick a color" />
  <input id="hexInput" type="text" placeholder="#3B82F6" maxlength="7" />
  <input id="labelInput" type="text" placeholder="Color name (optional)" />
  <button onclick="addSwatch()">Add swatch</button>
  <button id="clearBtn" onclick="clearAll()">Clear all</button>
</div>

<div id="swatchGrid" class="grid"></div>

<script>
let swatches = [
  { hex: "#3B82F6", label: "Routine" },
  { hex: "#F59E0B", label: "Important" },
  { hex: "#DC2626", label: "Urgent" },
  { hex: "#D44C47", label: "Dream Red" },
  { hex: "#CB912F", label: "Dream Yellow" },
  { hex: "#D9730D", label: "Dream Orange" },
  { hex: "#9F6B53", label: "Dream Brown" },
  { hex: "#448361", label: "Dream Green" },
  { hex: "#337EA9", label: "Dream Blue" },
  { hex: "#9065B0", label: "Dream Purple" },
  { hex: "#C14C8A", label: "Dream Pink" },
  { hex: "#55534E", label: "Dream Charcoal" },
  { hex: "#94BAA4", label: "Muted Dream Green" },
];

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const toL = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
}

function contrastRatio(hex, bg) {
  const l1 = luminance(hex), l2 = luminance(bg);
  const hi = Math.max(l1,l2), lo = Math.min(l1,l2);
  return ((hi+0.05)/(lo+0.05)).toFixed(1);
}

function textColor(hex) {
  return luminance(hex) > 0.179 ? "#1a1a1a" : "#ffffff";
}

function isValidHex(hex) {
  return /^#[0-9a-fA-F]{6}$/.test(hex);
}

function render() {
  const grid = document.getElementById("swatchGrid");
  grid.innerHTML = "";

  swatches.forEach((s, i) => {
    const fg = textColor(s.hex);
    const bgOverlay = fg === "#ffffff" ? "rgba(0,0,0,0.18)" : "rgba(255,255,255,0.3)";
    const wc = contrastRatio(s.hex, "#ffffff");
    const bc = contrastRatio(s.hex, "#1a1a1a");

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="swatch-top" style="background:${s.hex}" onclick="copySwatch(${i})" title="Click to copy hex">
        <span class="hex-label" style="color:${fg}; background:${bgOverlay}">${s.hex.toUpperCase()}</span>
        <button class="remove-btn" onclick="event.stopPropagation(); removeSwatch(${i})" aria-label="Remove swatch" style="background:${bgOverlay}; color:${fg}">×</button>
      </div>
      <div class="card-body">
        <p class="card-label">${s.label || "—"}</p>
        <p class="card-meta">vs white: ${wc}:1<br>vs black: ${bc}:1</p>
        <p class="copied" id="copied-${i}"></p>
      </div>
    `;
    grid.appendChild(card);
  });
}

function addSwatch() {
  const raw = document.getElementById("hexInput").value.trim();
  const hex = raw.startsWith("#") ? raw : "#" + raw;
  const label = document.getElementById("labelInput").value.trim();
  const hexEl = document.getElementById("hexInput");

  if (!isValidHex(hex)) {
    hexEl.classList.add("error-shake");
    setTimeout(() => hexEl.classList.remove("error-shake"), 1000);
    return;
  }
  swatches.push({ hex: hex.toUpperCase(), label });
  hexEl.value = "";
  document.getElementById("labelInput").value = "";
  render();
}

function removeSwatch(i) {
  swatches.splice(i, 1);
  render();
}

function clearAll() {
  if (confirm("Remove all swatches?")) { swatches = []; render(); }
}

function copySwatch(i) {
  navigator.clipboard.writeText(swatches[i].hex).then(() => {
    const el = document.getElementById("copied-" + i);
    if (el) { el.textContent = "Copied!"; setTimeout(() => { el.textContent = ""; }, 1400); }
  });
}

document.getElementById("colorPicker").addEventListener("input", function() {
  document.getElementById("hexInput").value = this.value.toUpperCase();
});

document.getElementById("hexInput").addEventListener("input", function() {
  const val = this.value.startsWith("#") ? this.value : "#" + this.value;
  if (isValidHex(val)) document.getElementById("colorPicker").value = val;
});

document.getElementById("hexInput").addEventListener("keydown", e => { if (e.key === "Enter") addSwatch(); });
document.getElementById("labelInput").addEventListener("keydown", e => { if (e.key === "Enter") addSwatch(); });

render();
</script>
</body>
</html>
